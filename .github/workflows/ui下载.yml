name: 下载并同步 UI 压缩包

on:
  schedule:
    # 每天凌晨 2:00 自动运行 (UTC 时间)
    - cron: '0 2 * * *'
  workflow_dispatch: # 支持手动点击运行

permissions:
  contents: write

jobs:
  download-and-sync:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出目标分支 ui
      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          ref: ui
          fetch-depth: 0

      # 2. 下载文件并重命名
      - name: Download UI Zip files
        run: |
          echo "正在下载 MetaCubeXD..."
          curl -L "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip" -o "metacubexd-gh-pages.zip"
          
          echo "正在下载 Zashboard..."
          curl -L "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip" -o "zashboard-gh-pages.zip"

      # 3. 验证文件大小 (防止下载到空文件或错误页面)
      - name: Verify files
        run: |
          ls -lh *.zip
          if [ $(stat -c%s "metacubexd-gh-pages.zip") -lt 1000 ]; then echo "MetaCubeXD 下载异常"; exit 1; fi
          if [ $(stat -c%s "zashboard-gh-pages.zip") -lt 1000 ]; then echo "Zashboard 下载异常"; exit 1; fi

      # 4. 提交到 ui 分支
      - name: Commit and Push to ui
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add metacubexd-gh-pages.zip zashboard-gh-pages.zip
          
          # 检查是否有文件变动
          if git diff --cached --quiet; then
            echo "文件内容无变化，跳过推送。"
          else
            git commit -m "chore: 自动更新 UI 压缩包 ($(date +'%Y-%m-%d %H:%M'))"
            git push origin ui
          fi
