name: mihomo_mrs文件生成

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master branch (仅 mihomo 目录)
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          sparse-checkout: mihomo
          sparse-checkout-cone-mode: false

      - name: Install mihomo
        run: |
          wget https://github.com/MetaCubeX/mihomo/releases/download/v1.19.17/mihomo-linux-amd64-v1.19.17.gz
          gunzip mihomo-linux-amd64-v1.19.17.gz
          mv mihomo-linux-amd64-v1.19.17 mihomo
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/mihomo

      - name: Convert all yaml to mrs
        run: |
          find mihomo -type f -name "*.yaml" | while read FILE; do
            OUTPUT="${FILE%.yaml}.mrs"
            mihomo convert-ruleset domain yaml "$FILE" "$OUTPUT" 2>/dev/null || \
            mihomo convert-ruleset ipcidr yaml "$FILE" "$OUTPUT" 2>/dev/null || \
            echo "跳过（两种格式均失败）: $FILE"
          done

      - name: Commit and push to master
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          
          # 仅添加新生成或修改的文件，不要用 git add .
          git add mihomo/*.mrs
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            # 这里的 commit 会包含 delete 标记，
            # 如果你发现还是有 delete，尝试执行 git checkout mihomo/*.mrs 恢复误删
            git commit -m "Auto convert Mihomo rules"
            git push origin master
          fi
